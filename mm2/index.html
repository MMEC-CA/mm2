<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NEON INVADERS</title>
    <style>
      :root {
        --neon-blue: #00f2ff;
        --neon-pink: #ff00ff;
        --neon-purple: #bc13fe;
        --bg-dark: #050505;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-dark);
        font-family: 'Courier New', Courier, monospace;
        color: white;
        user-select: none;
      }

      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        background: #000;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        max-width: 100%;
        max-height: 100%;
      }

      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hud {
        position: absolute;
        top: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 40px;
        box-sizing: border-box;
        font-size: 20px;
        text-shadow: 0 0 10px var(--neon-blue);
      }

      #start-screen, #game-over-screen {
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.85);
        padding: 40px;
        border: 2px solid var(--neon-blue);
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 30px var(--neon-blue);
        z-index: 10;
      }

      h1 {
        font-size: 48px;
        margin-bottom: 20px;
        color: var(--neon-blue);
        text-shadow: 0 0 20px var(--neon-blue);
        letter-spacing: 5px;
      }

      .btn {
        padding: 15px 40px;
        font-size: 24px;
        background: transparent;
        color: var(--neon-pink);
        border: 2px solid var(--neon-pink);
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 20px;
      }

      .btn:hover {
        background: var(--neon-pink);
        color: black;
        box-shadow: 0 0 20px var(--neon-pink);
      }

      .hidden {
        display: none !important;
      }

      .controls-hint {
        margin-top: 20px;
        font-size: 14px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
      
      <div id="ui-overlay">
        <div class="hud">
          <div>SCORE: <span id="score">0000</span></div>
          <div>LIVES: <span id="lives">3</span></div>
        </div>

        <div id="start-screen">
          <h1>NEON INVADERS</h1>
          <p>DEFEND THE CYBER-GRID</p>
          <button class="btn" id="start-btn">INITIALIZE</button>
          <div class="controls-hint">
            ARROWS / WASD TO MOVE<br>
            SPACE TO FIRE
          </div>
        </div>

        <div id="game-over-screen" class="hidden">
          <h1>TERMINATED</h1>
          <p>FINAL SCORE: <span id="final-score">0</span></p>
          <button class="btn" id="restart-btn">REBOOT</button>
        </div>
      </div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
